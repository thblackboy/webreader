use_default_settings: true

server:
  port: 8888
  bind_address: "127.0.0.1"
  secret_key: "webreader-local-secret-change-me"

search:
  safe_search: 0
  default_lang: "en"
  formats:
    - html
    - json

engines:
  - name: google
    engine: google
    disabled: false
  - name: bing
    engine: bing
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    disabled: false
  - name: wikipedia
    engine: wikipedia
    disabled: false

outgoing:
  request_timeout: 10.0
  max_request_timeout: 30.0
